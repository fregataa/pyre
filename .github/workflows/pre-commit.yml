# A basic workflow to run pre-commit on code changes.
# https://pre-commit.com and https://github.com/pre-commit/action

name: pre-commit

on:
  push:
    branches: [ "main", "py3.[0-9]+" ]
  pull_request:
    branches: [ "main", "py3.[0-9]+" ]

concurrency:
  group: pre-commit-${{ github.ref == 'refs/heads/main' && github.run_id || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: 3.x
    - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
